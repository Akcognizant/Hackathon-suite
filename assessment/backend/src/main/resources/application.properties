spring.application.name=backend

# Moved off 8080 to coexist with the hackathon portal backend (which owns 8080).
server.port=8082

spring.datasource.url=jdbc:postgresql://localhost:5432/pattern_recognition
spring.datasource.username=postgres
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT auth. NOTE: for production, override jwt.secret with a long random value via an
# environment variable (e.g. JWT_SECRET) and do not commit the real secret.
jwt.secret=dev-secret-change-me-to-a-long-random-value-at-least-32-chars
jwt.expiration-ms=86400000

# --- Hackathon SSO handoff ---
# Shared JWT secret with the hackathon portal. On a passing score this backend mints
# a hackathon-format token (subject=email, role=PARTICIPANT, name) signed with THIS
# secret, so the hackathon accepts it and logs the candidate straight in.
# MUST match the hackathon's jwt.secret exactly.
hackathon.jwt.secret=${HACKATHON_JWT_SECRET:ThisIsTheCognizantHackathonAdminPortalDevelopmentJwtSigningSecretKey2026!!}
hackathon.jwt.expiration-ms=86400000
# Where to send a passed candidate (the hackathon SPA's SSO landing lives at /sso).
hackathon.url=${HACKATHON_URL:http://localhost:5173}
