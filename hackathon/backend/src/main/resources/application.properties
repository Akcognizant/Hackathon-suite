spring.application.name=hackathon

# Server
server.port=8080

# PostgreSQL (local)
spring.datasource.url=jdbc:postgresql://localhost:5432/hackathondb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
# TODO: set your local PostgreSQL password here
spring.datasource.password=root

# JPA / Hibernate (dialect is auto-detected from the PostgreSQL driver)
spring.jpa.hibernate.ddl-auto=update

# JWT (dev secret; override via env in real deployments).
# Must be >= 64 bytes so jjwt can derive an HMAC-SHA key.
jwt.secret=${JWT_SECRET:ThisIsTheCognizantHackathonAdminPortalDevelopmentJwtSigningSecretKey2026!!}
jwt.expiration-ms=86400000

# Anthropic Claude API key — never hardcode; read from the ANTHROPIC_API_KEY env var.
anthropic.api-key=${ANTHROPIC_API_KEY:}

# AI scoring runs in MOCK mode by default (no key/network needed — for demos).
# Set to false and provide ANTHROPIC_API_KEY to make real Anthropic calls.
anthropic.mock-enabled=true

# Submission secrets are now PER-HACKATHON (multi-tenant): stored write-only on
# the Hackathon entity (Hackathon.submissionSecret) and validated per request in
# SubmissionService. The former global app.team-submission.secret was removed.

# AI Navigator — Spring runs the Claude Code CLI directly (no external Node proxy).
# Path to the claude executable; override via AI_CLAUDE_BIN on other machines.
ai.claude-bin=${AI_CLAUDE_BIN:C:/Users/2513946/AppData/Roaming/npm/node_modules/@anthropic-ai/claude-code/bin/claude.exe}
# haiku + low = fastest; raise to sonnet (and/or higher effort) for deeper answers.
ai.model=${AI_MODEL:haiku}
ai.effort=${AI_EFFORT:low}
# The grading assistant uses a stronger model (sonnet) for repository inspection,
# while general chat stays on the fast model above.
ai.grading-model=${AI_GRADING_MODEL:sonnet}
